services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mashup-dashboard-app
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      AGENT_VIZ_PORT: 4321
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-mashup_claude}
      DB_USER: ${MYSQL_USER:-mashup}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${APP_PORT:-4321}:4321"
    volumes:
      - app-data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: mashup-dashboard-mysql
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mashup_claude}
      MYSQL_USER: ${MYSQL_USER:-mashup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  app-data:
  mysql-data:
